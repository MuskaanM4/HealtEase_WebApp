<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HealthEase - Testimonials</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI',
          sans-serif;
        background-color: #f4f7f7;
      }

      .he-header {
        background-color: #c1e3df;
        padding: 1rem 1.5rem;
      }

      .he-logo {
        font-weight: 700;
        color: #0c3b5d;
      }

      .he-icon-btn {
        background-color: #0c3b5d;
        color: #ffffff;
        border-radius: 999px;
        border: none;
        padding: 0.4rem 0.9rem;
      }

      .he-section {
        background-color: #c1e3df;
        margin: 1.5rem;
        border-radius: 18px;
        padding: 2rem;
      }

      .he-card {
        background-color: #e7f4f2;
        border-radius: 18px;
        padding: 1.5rem;
        min-height: 220px;
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <header class="he-header">
      <div class="container-fluid">
        <div class="d-flex align-items-center justify-content-between gap-3">
          <a href="index.html" class="text-decoration-none">
            <div class="d-flex align-items-center gap-2">
              <div
                class="rounded-circle d-flex align-items-center justify-content-center"
                style="width: 40px; height: 40px; background-color: #0c3b5d;"
              >
                <span class="text-white fw-bold">H</span>
              </div>
              <span class="he-logo">HealthEase</span>
            </div>
          </a>
          <div class="flex-grow-1 mx-3 d-none d-md-block"></div>
          <div class="d-flex align-items-center gap-3">
            <button
              class="he-icon-btn position-relative"
              type="button"
              onclick="window.location.href='checkout.html'"
            >
              <span class="bi bi-cart"></span>
              <span
                id="cartCountBadge"
                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
              ></span>
            </button>
            <button
              class="btn btn-outline-dark rounded-circle border-0"
              type="button"
              data-bs-toggle="offcanvas"
              data-bs-target="#mainMenu"
              aria-controls="mainMenu"
            >
              <span class="bi bi-list" style="font-size: 1.5rem;"></span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Offcanvas Sidebar -->
    <div
      class="offcanvas offcanvas-end"
      tabindex="-1"
      id="mainMenu"
      aria-labelledby="mainMenuLabel"
    >
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="mainMenuLabel">Menu</h5>
        <button
          type="button"
          class="btn-close text-reset"
          data-bs-dismiss="offcanvas"
          aria-label="Close"
        ></button>
      </div>
      <div class="offcanvas-body d-flex flex-column gap-2">
        <a href="index.html" class="btn btn-link text-start">Home</a>
        <a href="shop.html" class="btn btn-link text-start">Shop</a>
        <a href="checkout.html" class="btn btn-link text-start">Cart / Checkout</a>
        <a href="essentials.html" class="btn btn-link text-start">Everyday Essentials</a>
        <a href="testimonials.html" class="btn btn-link text-start">Testimonials</a>
        <a href="faq.html" class="btn btn-link text-start">FAQ</a>
        <a href="contact.html" class="btn btn-link text-start">Contact</a>
        <a href="login.html" class="btn btn-link text-start">Login / Signup</a>
      </div>
    </div>

    <section class="he-section">
      <div class="container-fluid">
        <h2 class="mb-1" style="color: #0c3b5d; font-weight: 700;">
          What clients say about us
        </h2>
        <p class="text-muted mb-4">
          Don't just take our word for it, hear from our happy customers!
        </p>

        <div id="reviewRow" class="row g-3 flex-nowrap overflow-auto"></div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
      async function loadReviews() {
        try {
          const res = await fetch('http://localhost:4000/api/reviews');
          const reviews = await res.json();
          const row = document.getElementById('reviewRow');
          row.innerHTML = '';
          if (!reviews.length) {
            row.innerHTML =
              '<p class="text-muted">No testimonials available yet.</p>';
            return;
          }

          reviews.forEach((r) => {
            const col = document.createElement('div');
            col.className = 'col-10 col-md-3';
            col.innerHTML = `
              <div class="he-card h-100 d-flex flex-column justify-content-between">
                <div>
                  <p class="mb-3" style="font-size: 0.9rem;">${r.comment}</p>
                </div>
                <div class="d-flex justify-content-between align-items-center mt-2">
                  <div>
                    ${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}
                  </div>
                  <div class="fw-semibold">${r.author}</div>
                </div>
              </div>
            `;
            row.appendChild(col);
          });
        } catch (err) {
          console.error(err);
        }
      }

      document.addEventListener('DOMContentLoaded', loadReviews);
    </script>
  </body>
  </html>

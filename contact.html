<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HealthEase - Contact</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI',
          sans-serif;
        background-color: #f4f7f7;
      }

      .he-header {
        background-color: #c1e3df;
        padding: 1rem 1.5rem;
      }

      .he-logo {
        font-weight: 700;
        color: #0c3b5d;
      }

      .he-icon-btn {
        background-color: #0c3b5d;
        color: #ffffff;
        border-radius: 999px;
        border: none;
        padding: 0.4rem 0.9rem;
      }

      .he-toggle-pill button {
        border-radius: 999px;
        padding: 0.4rem 1.4rem;
        border: 2px solid #0c3b5d;
        background-color: #e7f4f2;
        color: #0c3b5d;
        font-weight: 600;
      }

      .he-toggle-pill button.active {
        background-color: #0c3b5d;
        color: #ffffff;
      }

      .he-form-wrapper {
        background-color: #c1e3df;
        border-radius: 18px;
        padding: 2rem;
        margin: 1.5rem;
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <header class="he-header">
      <div class="container-fluid">
        <div class="d-flex align-items-center justify-content-between gap-3">
          <a href="index.html" class="text-decoration-none">
            <div class="d-flex align-items-center gap-2">
              <div
                class="rounded-circle d-flex align-items-center justify-content-center"
                style="width: 40px; height: 40px; background-color: #0c3b5d;"
              >
                <span class="text-white fw-bold">H</span>
              </div>
              <span class="he-logo">HealthEase</span>
            </div>
          </a>
          <div class="flex-grow-1 mx-3 d-none d-md-block"></div>
          <div class="d-flex align-items-center gap-3">
            <button
              class="he-icon-btn position-relative"
              type="button"
              onclick="window.location.href='checkout.html'"
            >
              <span class="bi bi-cart"></span>
              <span
                id="cartCountBadge"
                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
              ></span>
            </button>
            <button
              class="btn btn-outline-dark rounded-circle border-0"
              type="button"
              data-bs-toggle="offcanvas"
              data-bs-target="#mainMenu"
              aria-controls="mainMenu"
            >
              <span class="bi bi-list" style="font-size: 1.5rem;"></span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Offcanvas Sidebar -->
    <div
      class="offcanvas offcanvas-end"
      tabindex="-1"
      id="mainMenu"
      aria-labelledby="mainMenuLabel"
    >
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="mainMenuLabel">Menu</h5>
        <button
          type="button"
          class="btn-close text-reset"
          data-bs-dismiss="offcanvas"
          aria-label="Close"
        ></button>
      </div>
      <div class="offcanvas-body d-flex flex-column gap-2">
        <a href="index.html" class="btn btn-link text-start">Home</a>
        <a href="shop.html" class="btn btn-link text-start">Shop</a>
        <a href="checkout.html" class="btn btn-link text-start">Cart / Checkout</a>
        <a href="faq.html" class="btn btn-link text-start">FAQ</a>
        <a href="contact.html" class="btn btn-link text-start">Contact</a>
        <a href="login.html" class="btn btn-link text-start">Login&Signup</a>
        <a href="essentials.html" class="btn btn-link text-start">Essentials</a>
        <a href="testimonials.html" class="btn btn-link text-start">Testimonials</a>
      </div>
    </div>

    <div class="he-form-wrapper">
      <div class="row g-4">
        <div class="col-md-5">
          <h2 class="mb-2" style="color: #0c3b5d; font-weight: 700;">
            Get in Touch with a Consultant
          </h2>
          <p class="text-muted">
            Have questions or need help? We're just a message away! Reach out to
            our team and we'll assist you with anything you need.
          </p>
          <div class="he-toggle-pill d-flex gap-3 mt-3">
            <button id="consultingBtn" type="button" class="active">
              Consulting
            </button>
            <button id="sponsoringBtn" type="button">Sponsoring</button>
          </div>
        </div>
        <div class="col-md-7">
          <form id="contactForm" class="row g-3">
            <div class="col-md-6">
              <input
                type="text"
                class="form-control"
                name="name"
                placeholder="Full Name"
                required
              />
            </div>
            <div class="col-md-6">
              <input
                type="email"
                class="form-control"
                name="email"
                placeholder="Email"
                required
              />
            </div>
            <div class="col-md-6">
              <input
                type="text"
                class="form-control"
                name="location"
                placeholder="Location"
              />
            </div>
            <div class="col-md-6">
              <input
                type="text"
                class="form-control"
                name="subject"
                placeholder="Subject"
              />
            </div>
            <div class="col-12">
              <textarea
                name="message"
                class="form-control"
                rows="4"
                placeholder="Message"
                required
              ></textarea>
            </div>
            <div class="col-12">
              <button
                type="submit"
                class="btn"
                style="
                  background-color: #0c3b5d;
                  color: #ffffff;
                  border-radius: 999px;
                  padding-inline: 2rem;
                "
              >
                Send Message
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
      let messageType = 'Consulting';

      document
        .getElementById('consultingBtn')
        .addEventListener('click', () => {
          messageType = 'Consulting';
          document.getElementById('consultingBtn').classList.add('active');
          document.getElementById('sponsoringBtn').classList.remove('active');
        });

      document
        .getElementById('sponsoringBtn')
        .addEventListener('click', () => {
          messageType = 'Sponsoring';
          document.getElementById('sponsoringBtn').classList.add('active');
          document.getElementById('consultingBtn').classList.remove('active');
        });

      document
        .getElementById('contactForm')
        .addEventListener('submit', async (e) => {
          e.preventDefault();
          const form = e.target;
          const payload = {
            name: form.name.value,
            email: form.email.value,
            location: form.location.value,
            type: messageType,
            message: form.message.value
          };

          try {
            const res = await fetch('http://localhost:4000/api/contact', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
            if (!res.ok) {
              throw new Error('Failed to send message');
            }
            alert('Message sent successfully. Thank you!');
            form.reset();
          } catch (err) {
            console.error(err);
            alert('Could not send message, please try again.');
          }
        });
    </script>
  </body>
  </html>

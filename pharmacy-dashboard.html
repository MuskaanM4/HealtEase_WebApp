<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HealthEase - Pharmacy Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI',
          sans-serif;
        background-color: #f4f7f7;
      }

      .he-header {
        background-color: #c1e3df;
        padding: 1rem 1.5rem;
      }

      .he-logo {
        font-weight: 700;
        color: #0c3b5d;
      }
    </style>
  </head>
  <body>
    <header class="he-header">
      <div class="container-fluid d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2">
          <span class="he-logo">HealthEase Pharmacy</span>
        </div>
        <button class="btn btn-sm btn-outline-dark" onclick="logout()">Logout</button>
      </div>
    </header>

    <main class="container py-4">
      <h2 class="mb-3" style="color:#0c3b5d;">Pharmacy Dashboard</h2>
      <p class="text-muted">
        Manage your stock levels and view incoming orders for your pharmacy.
      </p>

      <div class="row g-4">
        <div class="col-lg-6">
          <div class="card border-0 shadow-sm">
            <div class="card-header bg-white">
              <h5 class="mb-0">Stock per product</h5>
            </div>
            <div class="card-body">
              <table class="table table-sm align-middle" id="stockTable">
                <thead>
                  <tr>
                    <th>Product</th>
                    <th style="width:100px;">Quantity</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="card border-0 shadow-sm">
            <div class="card-header bg-white">
              <h5 class="mb-0">Recent Orders</h5>
            </div>
            <div class="card-body">
              <div class="table-responsive" style="max-height:320px;">
                <table class="table table-sm" id="ordersTable">
                  <thead>
                    <tr>
                      <th>ID</th>
                      <th>Customer</th>
                      <th>Total (SRD)</th>
                      <th>Created</th>
                    </tr>
                  </thead>
                  <tbody></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      let currentUser = null;
      let allProducts = [];
      let currentPharmacyId = null;

      function requirePharmacy() {
        const raw = localStorage.getItem('he_user');
        if (!raw) {
          window.location.href = 'login.html?returnTo=pharmacy-dashboard.html';
          return null;
        }
        const user = JSON.parse(raw);
        if (user.role !== 'PHARMACY') {
          window.location.href = 'index.html';
          return null;
        }
        return user;
      }

      function logout() {
        localStorage.removeItem('he_user');
        localStorage.removeItem('he_token');
        window.location.href = 'index.html';
      }

      async function loadProducts() {
        const res = await fetch('http://localhost:4000/api/products');
        allProducts = await res.json();
      }

      async function loadStock(pharmacyId) {
        const res = await fetch(
          `http://localhost:4000/api/pharmacies/${pharmacyId}/stock`
        );
        const stock = await res.json();
        const tbody = document.querySelector('#stockTable tbody');
        tbody.innerHTML = '';

        allProducts.forEach((p) => {
          const existing = stock.find((s) => s.productId === p.id);
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${p.name}</td>
            <td>
              <input type="number" class="form-control form-control-sm qty-input" value="${
                existing ? existing.quantity : 0
              }" min="0" data-product-id="${p.id}">
            </td>
            <td>
              <button class="btn btn-sm btn-outline-primary update-btn" data-product-id="${
                p.id
              }">Save</button>
            </td>
          `;
          tbody.appendChild(tr);
        });

        tbody.addEventListener('click', async (e) => {
          if (e.target.classList.contains('update-btn')) {
            const productId = Number(e.target.dataset.productId);
            const input = tbody.querySelector(
              `.qty-input[data-product-id="${productId}"]`
            );
            const quantity = Number(input.value || '0');
            await fetch(
              `http://localhost:4000/api/pharmacies/${pharmacyId}/stock`,
              {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ productId, quantity })
              }
            );
            alert('Stock updated');
          }
        });
      }

      async function loadOrders(pharmacyId) {
        const res = await fetch(
          `http://localhost:4000/api/pharmacies/${pharmacyId}/orders`
        );
        const orders = await res.json();
        const tbody = document.querySelector('#ordersTable tbody');
        tbody.innerHTML = '';
        orders.forEach((o) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${o.id}</td>
            <td>${o.customerName}</td>
            <td>${Number(o.totalAmount).toFixed(2)}</td>
            <td>${new Date(o.createdAt).toLocaleString()}</td>
          `;
          tbody.appendChild(tr);
        });
      }

      async function tryAutoSelectPharmacy(user) {
        // fetch pharmacies and try to match by email
        const res = await fetch('http://localhost:4000/api/pharmacies');
        const list = await res.json();
        const match = list.find(p => p.email === user.email);
        if (match) return match.id;
        // fallback: if user has pharmacyId property
        if (user.pharmacyId) return user.pharmacyId;
        // otherwise default to first
        return list.length ? list[0].id : null;
      }

      document.addEventListener('DOMContentLoaded', async () => {
        currentUser = requirePharmacy();
        if (!currentUser) return;
        const token = localStorage.getItem('he_token');
        const pharmacyId = await tryAutoSelectPharmacy(currentUser);
        if (!pharmacyId) return alert('No pharmacies found');
        currentPharmacyId = pharmacyId;
        await loadProducts();
        await loadStock(pharmacyId);
        await loadOrders(pharmacyId);

        // enable order status updates (requires token & PHARMACY role on server)
        // fetch recent orders and add simple status update controls below table
        const wrap = document.getElementById('ordersTable').parentElement;
        const statusDiv = document.createElement('div');
        statusDiv.className = 'mt-3';
        statusDiv.innerHTML = '<h6>Manage Order Status</h6><div id="ordersManage"></div>';
        wrap.appendChild(statusDiv);
        const manageEl = document.getElementById('ordersManage');
        const ordersRes = await fetch(`http://localhost:4000/api/pharmacies/${pharmacyId}/orders`);
        const orders = await ordersRes.json();
        if (!orders.length) { manageEl.innerHTML = '<p class="small text-muted">No orders.</p>'; }
        orders.forEach(o => {
          const el = document.createElement('div');
          el.className = 'd-flex gap-2 align-items-center mb-2';
          el.innerHTML = `<div class="me-auto">#${o.id} — ${o.customerName} — Status: <strong>${o.status||'PENDING'}</strong></div>`;
          ['PROCESSING','READY','DELIVERED','CANCELLED'].forEach(s => {
            const b = document.createElement('button');
            b.className = 'btn btn-sm btn-outline-secondary';
            b.textContent = s;
            b.addEventListener('click', async () => {
              const tkn = localStorage.getItem('he_token');
              const r = await fetch(`http://localhost:4000/api/orders/${o.id}/status`, {
                method: 'PATCH',
                headers: { 'Content-Type':'application/json', Authorization: 'Bearer ' + tkn },
                body: JSON.stringify({ status: s })
              });
              if (!r.ok) return alert('Failed to update');
              alert('Updated');
              await loadOrders(pharmacyId);
            });
            el.appendChild(b);
          });
          manageEl.appendChild(el);
        });
      });
    </script>
  </body>
  </html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HealthEase - Login / Register</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI',
          sans-serif;
        background-color: #c1e3df;
      }

      .auth-card {
        background-color: #c1e3df;
        border-radius: 18px;
        padding: 2rem;
        margin: 1.5rem auto;
        max-width: 900px;
      }

      .auth-panel {
        background-color: #e7f4f2;
        border-radius: 18px;
        padding: 1.8rem;
      }

      .brand {
        font-weight: 700;
        color: #0c3b5d;
      }
    </style>
  </head>
  <body>
    <div class="auth-card">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <span class="brand">HealthEase</span>
        <a href="index.html" class="text-decoration-none">← Back to Home</a>
      </div>
      <div class="row g-3">
        <div class="col-md-6">
          <div class="auth-panel h-100">
            <h4 class="mb-3" style="color: #0c3b5d;">Log In</h4>
            <form id="loginForm" class="mb-3">
              <div class="mb-3">
                <input
                  type="email"
                  class="form-control"
                  name="email"
                  placeholder="Your email"
                  required
                />
              </div>
              <div class="mb-3">
                <input
                  type="password"
                  class="form-control"
                  name="password"
                  placeholder="Password"
                  required
                />
              </div>
              <button class="btn w-100" style="background:#0c3b5d;color:#fff;">
                Log in
              </button>
            </form>
            <p class="small text-center mb-1">
              <a href="#" class="text-decoration-none">Forgot password?</a>
            </p>
            <p class="small text-center">
              Don't have an account?
              <a href="#register" class="text-decoration-none">Sign Up</a>
            </p>
          </div>
        </div>
        <div class="col-md-6" id="register">
          <div class="auth-panel h-100">
            <h4 class="mb-3" style="color: #0c3b5d;">Register</h4>
            <form id="registerForm">
              <div class="mb-3">
                <input
                  type="email"
                  class="form-control"
                  name="email"
                  placeholder="Your email"
                  required
                />
              </div>
              <div class="mb-3">
                <input
                  type="password"
                  class="form-control"
                  name="password"
                  placeholder="Password"
                  required
                />
              </div>
              <div class="mb-3">
                <input
                  type="password"
                  class="form-control"
                  name="passwordRepeat"
                  placeholder="Repeat Password"
                  required
                />
              </div>
              <button class="btn w-100" style="background:#0c3b5d;color:#fff;">
                Sign up
              </button>
            </form>
            <p class="small text-center mt-3">
              Already have an account?
              <a href="#top" class="text-decoration-none">Log in</a>
            </p>
          </div>
        </div>
      </div>
    </div>

    <script>
      document
        .getElementById('loginForm')
        .addEventListener('submit', async (e) => {
          e.preventDefault();
          const form = e.target;
          const payload = {
            email: form.email.value,
            password: form.password.value
          };
          try {
            const res = await fetch('http://localhost:4000/api/auth/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
            if (!res.ok) {
              const data = await res.json().catch(() => ({}));
              throw new Error(data.error || 'Login failed');
            }
            const user = await res.json();
            localStorage.setItem('he_user', JSON.stringify(user));
            if (user.role === 'PHARMACY') {
              window.location.href = 'pharmacy-dashboard.html';
            } else if (user.role === 'ADMIN') {
              window.location.href = 'admin-dashboard.html';
            } else {
              window.location.href = 'index.html';
            }
          } catch (err) {
            alert(err.message);
          }
        });

      document
        .getElementById('registerForm')
        .addEventListener('submit', (e) => {
          e.preventDefault();
          alert('Registration flow not implemented in this demo. Please ask the admin to create your account.');
        });
    </script>
  </body>
  </html>
